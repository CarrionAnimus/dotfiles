#-----------------------------------------------------------------------------------------------------------
# Slow app launch fix
#-----------------------------------------------------------------------------------------------------------

exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP QT_QPA_PLATFORMTHEME &
exec-once = hash dbus-update-activation-environment 2>/dev/null &
exec-once = dbus-update-activation-environment --systemd --all &
exec-once = ~/.config/hypr/scripts/portals.sh

#-----------------------------------------------------------------------------------------------------------
# Utilities
#-----------------------------------------------------------------------------------------------------------

exec-once = /usr/libexec/xfce-polkit &
exec-once = systemctl --user start opentabletdriver.service
exec-once = bash -c "mkfifo /tmp/$HYPRLAND_INSTANCE_SIGNATURE.wob && tail -f /tmp/$HYPRLAND_INSTANCE_SIGNATURE.wob | wob & disown" &
exec-once = hypridle &
exec-once = bash -c "GDK_BACKEND=wayland waybar & disown"&
exec-once = swaync &
exec-once = swww-daemon -q &

#-----------------------------------------------------------------------------------------------------------
# Applications
#-----------------------------------------------------------------------------------------------------------

exec-once = hyprctl dispatch exec "[workspace special silent; float; size 55% 60%; move center] foot"
exec-once = hyprctl dispatch exec "[workspace 1 silent] foot"
exec-once = hyprctl dispatch exec "[workspace 2 silent] flatpak run app.zen_browser.zen"
exec-once = hyprctl dispatch exec "[workspace 3 silent] flatpak run com.vscodium.codium"
exec-once = hyprctl dispatch exec "[workspace 4 silent] flatpak run org.kde.krita"